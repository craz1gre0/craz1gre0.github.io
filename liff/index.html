<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>爬梯子遊戲</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: sans-serif;
    }
    
    .loading-container {
      text-align: center;
      color: white;
    }
    
    .ladder {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      position: relative;
    }
    
    .ladder::before,
    .ladder::after {
      content: '';
      position: absolute;
      width: 15px;
      height: 80px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
    }
    
    .ladder::before {
      left: 10px;
      animation: sway 1s ease-in-out infinite;
    }
    
    .ladder::after {
      right: 10px;
      animation: sway 1s ease-in-out infinite;
    }
    
    .rungs {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    
    .rung {
      position: absolute;
      width: 50px;
      height: 8px;
      background: rgba(255, 255, 255, 0.6);
      left: 15px;
      border-radius: 4px;
      animation: fadeRung 1.5s ease-in-out infinite;
    }
    
    .rung:nth-child(1) { top: 10px; animation-delay: 0s; }
    .rung:nth-child(2) { top: 30px; animation-delay: 0.2s; }
    .rung:nth-child(3) { top: 50px; animation-delay: 0.4s; }
    .rung:nth-child(4) { top: 70px; animation-delay: 0.6s; }
    
    @keyframes sway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(2deg); }
    }
    
    @keyframes fadeRung {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    
    .loading-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .dots {
      font-size: 24px;
    }
    
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="ladder">
      <div class="rungs">
        <div class="rung"></div>
        <div class="rung"></div>
        <div class="rung"></div>
        <div class="rung"></div>
      </div>
    </div>
    <div class="loading-text">正在準備爬梯子<span class="dots"></span></div>
  </div>

  <script>
    const liffId = "2008263307-1kVLQMwR";

    function getParameterByName(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    async function main() {
      try {
        // 初始化 LIFF
        await liff.init({ liffId });

        // 如果未登入，靜默登入
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // 取得參數
        const auto = getParameterByName("auto");
        const type = getParameterByName("type");
        const text = getParameterByName("text");

        // 檢查是否為自動模式且有文字內容
        if (auto === "yes" && type === "text" && text) {
          const context = liff.getContext();

          // 檢查是否在聊天 context
          if (context.type === "utou" || context.type === "group" || context.type === "room") {
            // 在聊天中，直接發訊息
            await liff.sendMessages([{ type: "text", text: decodeURIComponent(text) }]);
            
            // 延遲一下再關閉，讓使用者看到 loading 完成
            setTimeout(() => {
              liff.closeWindow();
            }, 500);
          } else {
            // 非聊天 context，嘗試用 shareTargetPicker
            await liff.shareTargetPicker([
              { type: "text", text: decodeURIComponent(text) }
            ]);
            
            setTimeout(() => {
              liff.closeWindow();
            }, 500);
          }
        } else {
          // 參數不完整，2秒後關閉
          setTimeout(() => {
            liff.closeWindow();
          }, 2000);
        }
      } catch (err) {
        console.error("錯誤：", err);
        // 發生錯誤也靜默關閉
        setTimeout(() => {
          liff.closeWindow();
        }, 2000);
      }
    }

    main();
  </script>
</body>
</html>
