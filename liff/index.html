<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LIFF 自動發送訊息</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h3>正在準備發送訊息...</h3>

  <script>
    // 你的 LIFF ID
    const liffId = "2008259299-aZKv2Rd2";

    // 從網址抓參數
    function getParameterByName(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    async function main() {
      await liff.init({ liffId });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const text = getParameterByName("text");
      const type = getParameterByName("type") || "text";

      if (text) {
        await liff.sendMessages([
          { type, text }
        ]);
        alert("訊息已發送 ✅");
        liff.closeWindow();
      } else {
        document.body.innerHTML = "<h3>請在網址後加上 ?text=訊息內容</h3>";
      }
    }

    main();
  </script>
</body>
</html>
